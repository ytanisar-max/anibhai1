name: 24/7 Keep-Alive Ping

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    
    - name: Keep VPS Active
      run: |
        echo "⏰ Keep-Alive Ping: $(date)"
        echo "✅ VPS is running 24/7"
        echo "🔄 Automatic ping executed"
    
    - name: Update Status File
      run: |
        echo "Last Keep-Alive: $(date)" > .vps-status
        
    - name: Commit Changes
      run: |
        git config --local user.email "bot@github.com"
        git config --local user.name "VPS Keep-Alive Bot"
        git add .vps-status || true
        git diff --quiet && git diff --staged --quiet || git commit -m "Keep-Alive: $(date)"
        git push origin main || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
